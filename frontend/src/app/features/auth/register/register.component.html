<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon-wrap">
        <i class="pi pi-camera"></i>
      </div>
      <h1>NexaGram</h1>
    </div>

    <p class="auth-subtitle">Cadastre-se para ver fotos e vídeos dos seus amigos.</p>

    @if (error()) {
      <p-message severity="error" [text]="error()" styleClass="w-full" />
    }

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <input pInputText type="text" placeholder="Nome completo" [(ngModel)]="displayName" name="displayName" class="w-full" />
      </div>
      <div class="field">
        <input pInputText type="text" placeholder="Nome de usuário" [(ngModel)]="username" name="username" class="w-full" autocomplete="username" />
      </div>
      <div class="field">
        <input pInputText type="email" placeholder="E-mail" [(ngModel)]="email" name="email" class="w-full" autocomplete="email" />
      </div>
      <div class="field">
        <p-password
          [(ngModel)]="password"
          name="password"
          placeholder="Senha"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>
      <p-button type="submit" label="Cadastrar" [loading]="loading()" styleClass="w-full" />
    </form>

    <div class="auth-divider"><span>ou</span></div>
    <p class="auth-switch">Já tem uma conta? <a routerLink="/login">Entrar</a></p>
  </div>
</div>
